<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AirLink Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>AirLink Admin Dashboard</h1>
  </header>

  <main class="layout">
    <section class="card">
      <h2>System Status</h2>
      <p id="system-status">Loading...</p>
    </section>

    <section class="card">
      <h2>Metrics</h2>
      <ul>
        <li>CPU Load: <span id="cpu-load">--</span></li>
        <li>Active Sessions: <span id="active-sessions">--</span></li>
        <li>Signal Health: <span id="signal-health">--</span></li>
      </ul>
    </section>

    <section class="card">
      <h2>Actions</h2>
      <button id="refresh-btn">Refresh</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
